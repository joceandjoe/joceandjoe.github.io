<!-- jQuery -->
<script src="{{ '/js/jquery.js' | relative_url }}"></script>

<!-- Bootstrap Core JavaScript -->
<script src="{{ '/js/bootstrap.min.js' | relative_url }}"></script>

<script>
    // Set the date we're counting down to
    const weddingDate = new Date("June 6, 2026 15:00:00").getTime();

    // Function to update nav height variable
    function updateNavHeight() {
        const nav = document.querySelector('.wedding-nav');
        if (nav) {
            const height = nav.offsetHeight;
            document.documentElement.style.setProperty('--nav-height', height + 'px');
        }
    }

    // Update on load and resize
    window.addEventListener('load', updateNavHeight);
    window.addEventListener('resize', updateNavHeight);

    // Update the count down every 1 second
    const x = setInterval(function () {
        const now = new Date().getTime();
        const distance = weddingDate - now;

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        // Display the results
        const dEl = document.getElementById("days");
        const hEl = document.getElementById("hours");
        const mEl = document.getElementById("minutes");
        const sEl = document.getElementById("seconds");
        
        if (dEl) dEl.innerText = days.toString().padStart(2, '0');
        if (hEl) hEl.innerText = hours.toString().padStart(2, '0');
        if (mEl) mEl.innerText = minutes.toString().padStart(2, '0');
        if (sEl) sEl.innerText = seconds.toString().padStart(2, '0');
 
        // If the count down is finished
        if (distance < 0) {
            clearInterval(x);
            const countEl = document.getElementById("countdown");
            if (countEl) countEl.innerHTML = "<h3>Just Married!</h3>";
        }
    }, 1000);
</script>
